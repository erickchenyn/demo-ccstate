# Lefthook 配置文件
# 文档: https://github.com/evilmartians/lefthook

# 在 pre-commit 阶段运行的钩子
pre-commit:
  parallel: true
  commands:
    # 1. 验证配置一致性（最重要，优先级最高）
    validate-config:
      tags: config validation
      run: node scripts/validate-config.js
      fail_text: "❌ EditorConfig 和 Prettier 配置不一致！请修复后重新提交。"

    # 2. 检查代码格式
    format-check:
      tags: formatting
      run: npm run format:check
      fail_text: "❌ 代码格式不符合规范！运行 'npm run format' 修复后重新提交。"

    # 3. ESLint 检查
    lint:
      tags: linting
      run: npm run lint
      fail_text: "❌ ESLint 检查失败！运行 'npm run lint:fix' 修复后重新提交。"

    # 4. TypeScript 类型检查
    type-check:
      tags: types
      run: npm run type-check
      fail_text: "❌ TypeScript 类型检查失败！请修复类型错误后重新提交。"

# 在 pre-push 阶段运行的钩子（可选，更严格的检查）
pre-push:
  commands:
    # 完整的项目检查
    full-check:
      tags: comprehensive
      run: npm run precommit
      fail_text: "❌ 完整检查失败！请修复所有问题后重新推送。"

# 在 commit-msg 阶段验证提交信息（可选）
commit-msg:
  commands:
    # 检查提交信息格式（可以根据团队需求调整）
    commitlint:
      tags: commit message
      run: |
        # 简单的提交信息检查
        if ! grep -qE "^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .{1,50}" "$1"; then
          echo "❌ 提交信息格式不正确！"
          echo "格式: type(scope): description"
          echo "类型: feat, fix, docs, style, refactor, test, chore"
          echo "示例: feat(auth): add user login functionality"
          exit 1
        fi
      fail_text: "❌ 提交信息格式不符合规范！"

# 跳过某些钩子的配置（用于紧急情况）
skip_output:
  - meta
  - summary

# 输出配置
output:
  - summary
  - success
  - failure
